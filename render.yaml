services:
  # ── Sentrix Backend (FastAPI) ──
  - type: web
    name: sentrix-backend
    plan: free
    runtime: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://sentrix.onrender.com,https://sentrix-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_2Yw7ACOpaKWG@ep-hidden-firefly-anp2zrzr.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require

  # ── Sentrix Frontend (React/Vite) ──
  - type: web
    name: sentrix
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://sentrix-backend-qvv8.onrender.com
      - key: VITE_WS_URL
        value: wss://sentrix-backend-qvv8.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
