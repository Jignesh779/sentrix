services:
  # ── Sentrix Backend (FastAPI) ──
  - type: web
    name: sentrix-backend
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://sentrix-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Sentrix Frontend (React/Vite) ──
  - type: web
    name: sentrix-frontend
    runtime: static
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://sentrix-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://sentrix-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
